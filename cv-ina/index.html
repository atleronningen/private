  <script type="text/babel" data-presets="env,react">
  const { useState, useEffect, useRef, useMemo, useCallback } = React;

  function useSort(items, mode) {
    return useMemo(() => {
      const arr = [...items];
      if (mode === 'tid-ny') arr.sort((a, b) => (b.sortKey ?? 0) - (a.sortKey ?? 0));
      else if (mode === 'tid-gammel') arr.sort((a, b) => (a.sortKey ?? 0) - (b.sortKey ?? 0));
      return arr;
    }, [items, mode]);
  }

  function useSwipe(onLeft, onRight) {
    const ref = useRef(null);
    useEffect(() => {
      const el = ref.current;
      if (!el) return;
      let startX = 0, startY = 0, t = 0;
      const onStart = (e) => {
        const touch = e.touches ? e.touches[0] : e;
        startX = touch.clientX; startY = touch.clientY; t = Date.now();
      };
      const onEnd = (e) => {
        const touch = e.changedTouches ? e.changedTouches[0] : e;
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;
        const dt = Date.now() - t;
        if (dt < 800 && Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.4) {
          if (dx < 0) onLeft && onLeft();
          else onRight && onRight();
        }
      };
      el.addEventListener('touchstart', onStart, { passive: true });
      el.addEventListener('touchend', onEnd, { passive: true });
      return () => {
        el.removeEventListener('touchstart', onStart);
        el.removeEventListener('touchend', onEnd);
      };
    }, [onLeft, onRight]);
    return ref;
  }

  function useKeys(onLeft, onRight) {
    useEffect(() => {
      const fn = (e) => {
        if (e.key === 'ArrowLeft') onLeft && onLeft();
        else if (e.key === 'ArrowRight') onRight && onRight();
      };
      window.addEventListener('keydown', fn);
      return () => window.removeEventListener('keydown', fn);
    }, [onLeft, onRight]);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function fmt(d) {

              </div>
            </div>
          </header>

          <div data-no-print className="no-print gl-card" style={{ padding: 16, marginTop: 28, display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12, alignItems: 'center' }}>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center' }}>
              <span className="gl-meta" style={{ marginRight: 6 }}>Sortér</span>
              <button className="gl-btn" aria-pressed={sortMode==='tid-ny'} onClick={() => setSortMode('tid-ny')}>Nyest →</button>
              <button className="gl-btn" aria-pressed={sortMode==='tid-gammel'} onClick={() => setSortMode('tid-gammel')}>← Eldst</button>
            </div>
            <button className="gl-btn" style={{ background: 'linear-gradient(135deg, oklch(70% 0.18 300), oklch(70% 0.16 245))', borderColor: 'transparent', color: '#fff' }} onClick={() => exportPDF()}>↓ Last ned PDF</button>
          </div>

          <div data-no-print className="no-print" style={{ display: 'flex', gap: 6, marginTop: 22, flexWrap: 'wrap' }}>
            <button className="gl-btn" aria-pressed={visAlt} onClick={() => setSeksjonIdx(-1)}>Vis alt</button>
            {seksjoner.map((s, i) => (
              <button key={s} className="gl-btn" aria-pressed={seksjonIdx===i} onClick={() => setSeksjonIdx(i)}>{s}</button>
            ))}
          </div>
          <div data-no-print className="no-print gl-prog">
            <div className="gl-prog-fill" style={{ width: visAlt ? '100%' : `${((seksjonIdx+1)/seksjoner.length)*100}%` }} />
          </div>

          {(visAlt || seksjonIdx===0) && (
            <section style={{ marginTop: 28 }}>
              <h2 className="gl-section-h">Om meg.</h2>
              <div className="gl-card" style={{ '--accent': 'oklch(70% 0.18 300)' }}>
                <p style={{ margin: 0, fontSize: 'clamp(15px, 1.7vw, 18px)', lineHeight: 1.6, color: 'rgba(240,238,247,.92)' }}>
                  {data.profil}
                </p>
              </div>
            </section>
          )}

          {(visAlt || seksjonIdx===1) && (
            <section style={{ marginTop: 28 }}>
              <h2 className="gl-section-h">Erfaring.</h2>
              <div className="gl-grid">
                {erfaring.map((e) => (
                  <article key={e.id} className="gl-card" style={{ '--accent': window.CV_FARGER[e.farge] }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12, alignItems: 'flex-start', marginBottom: 14 }}>
                      <div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
                          <span className="gl-dot" style={{ background: window.CV_FARGER[e.farge], color: window.CV_FARGER[e.farge] }} />
                          <span className="gl-meta" style={{ color: window.CV_FARGER[e.farge] }}>{periode(e.fra, e.til)}</span>
                        </div>
                        <h3 style={{ margin: 0, fontSize: 22, fontWeight: 600, letterSpacing: '-0.01em' }}>{e.rolle}</h3>
                        <div style={{ color: 'rgba(240,238,247,.7)', fontSize: 14, marginTop: 2 }}>{e.sted}</div>
                      </div>
                    </div>
                    <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'grid', gap: 6 }}>
                      {e.punkter.map((p, j) => (
                        <li key={j} style={{ paddingLeft: 18, position: 'relative', fontSize: 14, lineHeight: 1.55, color: 'rgba(240,238,247,.85)' }}>
                          <span style={{ position: 'absolute', left: 0, top: 9, width: 8, height: 1, background: window.CV_FARGER[e.farge] }} />
                          {p}
                        </li>
                      ))}
                    </ul>
                  </article>
                ))}
              </div>
            </section>
          )}

          {(visAlt || seksjonIdx===2) && (
            <section style={{ marginTop: 28 }}>
              <h2 className="gl-section-h">Utdanning.</h2>
              <div className="gl-grid" style={{ gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))' }}>
                {utdanning.map((u) => (
                  <article key={u.id} className="gl-card" style={{ '--accent': window.CV_FARGER[u.farge] }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
                      <span className="gl-dot" style={{ background: window.CV_FARGER[u.farge], color: window.CV_FARGER[u.farge] }} />
                      <span className="gl-meta" style={{ color: window.CV_FARGER[u.farge] }}>{periode(u.fra, u.til)}</span>
                    </div>
                    <h3 style={{ margin: 0, fontSize: 18, fontWeight: 600 }}>{u.sted}</h3>
                    <div style={{ color: 'rgba(240,238,247,.85)', fontSize: 14, marginTop: 4 }}>{u.grad}</div>
                    <div style={{ color: 'rgba(240,238,247,.55)', fontSize: 13, marginTop: 4 }}>{u.detalj}</div>
                  </article>
                ))}
              </div>
            </section>
          )}

          {(visAlt || seksjonIdx===3) && (
            <section style={{ marginTop: 28 }}>
              <h2 className="gl-section-h">Ferdigheter.</h2>
              <div className="gl-grid" style={{ gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))' }}>
                <FerdGlGruppe tittel="Språk" items={data.ferdigheter.sprak.map(s => ({...s, navn: `${s.navn} · ${s.niva}`}))} />
                <FerdGlGruppe tittel="Tekniske verktøy" items={data.ferdigheter.teknisk} />
                <FerdGlGruppe tittel="Personlig" items={data.ferdigheter.personlig} />
              </div>
              <h2 className="gl-section-h" style={{ marginTop: 32 }}>Engasjement.</h2>
              <div className="gl-grid" style={{ gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))' }}>
                {data.engasjement.map(g => (
                  <div key={g.id} className="gl-card" style={{ '--accent': window.CV_FARGER[g.farge] }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
                      <span className="gl-dot" style={{ background: window.CV_FARGER[g.farge], color: window.CV_FARGER[g.farge] }} />
                      <span className="gl-meta" style={{ color: window.CV_FARGER[g.farge] }}>Frivillig</span>
                    </div>
                    <div style={{ fontSize: 16, fontWeight: 500 }}>{g.rolle}</div>
                    <div style={{ color: 'rgba(240,238,247,.6)', fontSize: 13, marginTop: 2 }}>{g.sted}</div>
                  </div>
                ))}
              </div>
            </section>
          )}

          <div style={{ marginTop: 40, paddingTop: 18, borderTop: '1px solid rgba(255,255,255,.08)', display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }} className="gl-meta">
            <span>{data.kontakt.adresse}</span>
            <span>© 2026 · Sveip ← → for å navigere</span>
          </div>
        </div>
      </div>
    );
  }

  function FerdGlGruppe({ tittel, items }) {
    return (
      <div className="gl-card">
        <div className="gl-meta" style={{ marginBottom: 14 }}>{tittel}</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
          {items.map(it => (
            <span key={it.id} className="gl-chip" style={{ borderColor: `${window.CV_FARGER[it.farge]}55`, background: `${window.CV_FARGER[it.farge]}11` }}>
              <span className="gl-dot" style={{ background: window.CV_FARGER[it.farge], color: window.CV_FARGER[it.farge] }} />
              {it.navn}
            </span>
          ))}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('app')).render(<GlassCV />);
  </script>
</body>
</html>
