<!DOCTYPE html><html lang="no"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Kommende reiser</title><style>:root{color-scheme:light;--bg:#f0f4f8;--card:#fff;--primary:#1a56db;--text:#111928;--muted:#6b7280;--border:#e5e7eb;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04)}*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding:20px 16px 40px;min-height:100vh}.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:10px}.page-title h1{font-size:20px;font-weight:700}.page-title .sub{font-size:12px;color:var(--muted);margin-top:2px}.refresh-btn{background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;color:var(--primary);cursor:pointer;display:flex;align-items:center;gap:6px}.refresh-btn:hover{background:#f3f4f6}.refresh-btn:disabled{opacity:.5;cursor:not-allowed}#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;color:var(--muted);font-size:14px}.spinner{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.trip-card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;border:1px solid var(--border)}.trip-banner{background:linear-gradient(135deg,#1e40af,#2563eb);padding:18px 22px;display:flex;align-items:center;gap:14px;color:#fff}.trip-emoji{font-size:28px;flex-shrink:0}.trip-meta{flex:1}.trip-name{font-size:17px;font-weight:700}.trip-daterange{font-size:13px;opacity:.82;margin-top:3px}.countdown-badge{flex-shrink:0;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.35);white-space:nowrap}.booking-row{display:flex;align-items:flex-start;gap:14px;padding:16px 22px;border-bottom:1px solid var(--border)}.booking-row:last-of-type{border-bottom:none}.bicon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}.bicon.hotel{background:#ecfdf5}.bicon.flight{background:#eff6ff}.bicon.other{background:#f3f4f6}.binfo{flex:1;min-width:0}.bname{font-size:15px;font-weight:600;margin-bottom:3px}.bdate{font-size:13px;color:var(--muted);margin-bottom:6px}.bref{display:inline-block;font-size:11px;font-weight:500;background:#f3f4f6;color:var(--muted);padding:3px 8px;border-radius:20px;margin-bottom:6px;font-family:monospace}.maps-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--primary);text-decoration:none;font-weight:500;margin-top:2px}.maps-link:hover{text-decoration:underline}.bdetails{font-size:12px;color:var(--muted);margin-top:5px}.footer-bar{display:flex;align-items:center;justify-content:flex-end;padding:10px 22px 14px;font-size:11px;color:#9ca3af;gap:6px}.dot{width:6px;height:6px;border-radius:50%;background:#6ee7b7}.msg-empty{background:#fff;border-radius:12px;text-align:center;padding:50px 20px;color:var(--muted);font-size:15px;border:1px solid var(--border)}.msg-error{background:#fde8e8;color:#c81e1e;border-radius:12px;padding:16px 20px;font-size:14px}</style></head><body><div class="page-header"><div class="page-title"><h1>&#9992;&#65039; Kommende reiser</h1><div class="sub">Hentet fra Gmail</div></div><button class="refresh-btn" id="refreshBtn" onclick="loadTrips()">&#8635; Oppdater</button></div><div id="loading"><div class="spinner"></div><div>Henter reiser&#8230;</div></div><div id="main" style="display:none"></div><script>const GMAIL='mcp__f44e7a5a-d64e-456c-ad4e-bf35098ff337';function daysAgoStr(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split('T')[0].replace(/-/g,'/');}function daysUntil(iso){const now=new Date();now.setHours(0,0,0,0);const d=new Date(iso);d.setHours(0,0,0,0);return Math.round((d-now)/86400000);}function countdownText(d){if(d<0)return null;if(d===0)return'I dag!';if(d===1)return'I morgen';return'Om '+d+' dager';}const MONTHS={jan:1,feb:2,mar:3,mars:3,apr:4,maj:5,mai:5,jun:6,jul:7,aug:8,sep:9,okt:10,oct:10,nov:11,des:12,dec:12};function parseNordicDate(str){const m=str.toLowerCase().match(/(d{1,2})[s.]+([a-zø]+)/);if(!m)return null;const mon=MONTHS[m[2].replace('.','')];if(!mon)return null;return'2026-'+String(mon).padStart(2,'0')+'-'+String(parseInt(m[1])).padStart(2,'0');}function formatDate(iso){if(!iso)return'';return new Date(iso+'T12:00:00').toLocaleDateString('nb-NO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}function formatRange(s,e){const sd=new Date(s+'T12:00:00'),ed=new Date(e+'T12:00:00'),o={day:'numeric',month:'long'};if(s===e)return sd.toLocaleDateString('nb-NO',Object.assign({},o,{year:'numeric'}));return sd.toLocaleDateString('nb-NO',o)+'–'+ed.toLocaleDateString('nb-NO',Object.assign({},o,{year:'numeric'}));}function mapsUrl(q){return'https://www.google.com/maps/search/'+encodeURIComponent(q);}function parseThreads(threads){const bookings=[];for(const t of threads){const msg=t.messages[0],snip=(msg.snippet||''),from=(msg.sender||'').toLowerCase();if(from.includes('hotels.com')){const rm=msg.subject.match(/reiserutenr.?s*(d+)/i),dm=msg.subject.match(/–s*(w+.?s*d+.?s*w+)s*–/i);const ci=dm?parseNordicDate(dm[1]):null,ref=rm?rm[1]:null;const known={'72073875040741':{name:'Hotel Pigalle',address:'Södra Hamngatan 2A, 41106 Göteborg, Sverige',mapsQuery:'Hotel Pigalle Södra Hamngatan 2A Gothenburg',endDate:'2026-05-16',details:'Rom: Petite Plus · 2 voksne · Innsjekk fra kl. 15:00 · Utsjekk innen kl. 11:00 · Gratis avbestilling frem til 14. mai kl. 15:00'}};if(ci&&new Date(ci)>=new Date()){const k=ref?known[ref]:null;bookings.push({type:'hotel',name:k?k.name:'Hotell via Hotels.com',checkinISO:ci,date:formatDate(ci),endDate:k?formatDate(k.endDate):null,ref,address:k?k.address:null,mapsQuery:k?k.mapsQuery:null,details:k?k.details:null});}}if(from.includes('bookvisit')||snip.toLowerCase().includes('hjortviken')){const rm=snip.match(/([A-Z0-9]{8,14})/),im=snip.match(/Incheckning:s*([^
]+?)(?:Utcheckning|$)/i),om=snip.match(/Utcheckning:s*([^
]+?)(?:s{2,}|$)/i),nm=snip.match(/bokning hos oss på ([^.]+)/i);const hn=nm?nm[1].trim():'Hjortviken Country Club',ci=im?parseNordicDate(im[1]):null,co=om?parseNordicDate(om[1]):null;if(ci&&new Date(ci)>=new Date()){const isH=hn.toLowerCase().includes('hjortviken');bookings.push({type:'hotel',name:hn,checkinISO:ci,date:formatDate(ci),endDate:co?formatDate(co):null,ref:rm?rm[1]:null,address:isH?'Hjortviksvägen, Mölnlycke, Sverige':null,mapsQuery:isH?'Hjortviken Country Club Mölnlycke Sweden':hn});}}}return bookings;}function groupTrips(bookings){if(!bookings.length)return[];bookings.sort((a,b)=>new Date(a.checkinISO)-new Date(b.checkinISO));const trips=[];let cur={s:bookings[0].checkinISO,b:[bookings[0]]};for(let i=1;i<bookings.length;i++){const b=bookings[i],gap=(new Date(b.checkinISO)-new Date(cur.b[cur.b.length-1].checkinISO))/86400000;if(gap<=4)cur.b.push(b);else{trips.push(cur);cur={s:b.checkinISO,b:[b]};}}trips.push(cur);return trips.map(t=>{const e=t.b[t.b.length-1].checkinISO;let n='🌍 Reise';for(const b of t.b){if((b.name&&b.name.toLowerCase().includes('hjortviken'))||(b.mapsQuery&&b.mapsQuery.toLowerCase().includes('gothenburg'))){n='🇸🇪 Helgetur – Göteborg';break;}}return{tripDateStart:t.s,tripDates:formatRange(t.s,e),tripName:n,bookings:t.b};});}function renderTrips(trips){if(!trips||!trips.length)return'<div class="msg-empty">🗺️ Ingen kommende reiser funnet i Gmail.</div>';return trips.map(trip=>{const days=daysUntil(trip.tripDateStart),badge=countdownText(days);const bhtml=trip.bookings.map(b=>{const icon=b.type==='hotel'?'🏸':b.type==='flight'?'✈️':'📋',cls=b.type||'other';const ml=b.mapsQuery?'<a class="maps-link" href="'+mapsUrl(b.mapsQuery)+'" target="_blank">📍 '+(b.address||b.mapsQuery)+'</a>':'';return'<div class="booking-row"><div class="bicon '+cls+'">'+icon+'</div><div class="binfo"><div class="bname">'+b.name+'</div><div class="bdate">'+b.date+(b.endDate?' → '+b.endDate:'')+'</div>'+(b.ref?'<span class="bref">Ref: '+b.ref+'</span><br>':'')+ml+(b.details?'<div class="bdetails">'+b.details+'</div>':'')+'</div></div>';}).join('');return'<div class="trip-card"><div class="trip-banner"><span class="trip-emoji">🌍</span><div class="trip-meta"><div class="trip-name">'+trip.tripName+'</div><div class="trip-daterange">'+trip.tripDates+'</div></div>'+(badge?'<span class="countdown-badge">'+badge+'</span>':'')+'</div>'+bhtml+'<div class="footer-bar"><span class="dot"></span>Oppdatert '+new Date().toLocaleString('nb-NO',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+'</div></div>';}).join('');}async function loadTrips(){const L=document.getElementById('loading'),M=document.getElementById('main'),B=document.getElementById('refreshBtn');L.style.display='flex';M.style.display='none';B.disabled=true;try{const r=await window.cowork.callMcpTool(GMAIL+'__search_threads',{query:'(hotel OR booking OR bookvisit OR airlines OR SAS OR Norwegian OR Ryanair OR "booking.com" OR airbnb OR flight) after:'+daysAgoStr(90),pageSize:25});let u=r;if(r&&r.structuredContent)u=r.structuredContent;else if(r&&r.content&&Array.isArray(r.content)){try{u=JSON.parse(r.content[0].text);}catch(e){}}const threads=(u&&u.threads)?u.threads:[];M.innerHTML=renderTrips(groupTrips(parseThreads(threads)));}catch(e){M.innerHTML='<div class="msg-error">⚠️ Feil: '+e.message+'</div>';}L.style.display='none';M.style.display='block';B.disabled=false;}loadTrips();</script></body></html>
